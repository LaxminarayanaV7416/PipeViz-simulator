version: "3.9"

services:
  # Backend service - FastAPI with Python/uv
  # pipeviz:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: pipeviz
  #   ports:
  #     - "5001:5001"
  #     - "5173:5173"
  #   environment:
  #     - ENV=development
  #     - LITELLM_HOST=litellm
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   group_add:
  #     - "0"
  #   networks:
  #     - pipeviz-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./llm_models/ollama_models:/root/.ollama
    restart: unless-stopped
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
        ollama serve &
        sleep 5;
        if ! ollama list | grep -q "llama3.2"; then
          ollama pull llama3.2;
        fi;
        wait
    networks:
      - pipeviz-network

  litellm:
    image: ghcr.io/berriai/litellm-database:main-latest
    container_name: litellm
    ports:
      - "4000:4000"
    volumes:
      - ./llm_models/config.yml:/app/config.yaml
    command: --config /app/config.yaml --port 4000
    environment:
      - LITELLM_MASTER_KEY=my-master-key
    restart: unless-stopped
    networks:
      - pipeviz-network

volumes:
  llm_models:

networks:
  pipeviz-network:
    driver: bridge
